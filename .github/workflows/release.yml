name: release

# 태그(vX.Y.Z) push로만 발행한다. 버전 원천은 package.json이고
# `pnpm version <patch|minor|major>`가 bump + 커밋 + 태그를 만든다.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # npm OIDC 트러스티드 퍼블리싱과 provenance에 필수

jobs:
  release:
    runs-on: ubuntu-latest   # OIDC는 GitHub-hosted 러너만 지원
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false   # 릴리스 빌드에는 캐시를 쓰지 않는다(cache:false는 무효값)
      - name: 태그와 package.json 버전 정합 확인
        run: test "v$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME}"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm verify:package        # tarball에 dist 포함 확인 (dry-run)
      - run: pnpm verify:server-json    # server.json ↔ package.json 정합
      - run: pnpm publish --no-git-checks   # NPM_TOKEN 없음, OIDC로 인증

  # npm 발행 성공 후에만 MCP 레지스트리에 등재 (server.json 기반, OIDC)
  publish-to-mcp-registry:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
      - name: npm 최신화 (OIDC는 npm 11.5.1+ 필요)
        run: npm install -g npm@latest
      - name: mcp-publisher 설치
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - run: ./mcp-publisher login github-oidc
      - run: ./mcp-publisher publish
